name: Global Payments Intelligence Pipeline

on:
#   schedule:
#     - cron: '0 17 * * *' # Run daily at 17:00 UTC (1:00 PM EDT)
  workflow_dispatch:     # Allow manual runs
    inputs:
      lookback_days:
        description: 'Number of days to look back for news'
        required: false
        default: '30'
        type: string

permissions:
  contents: write

jobs:
  run-pipeline:
    uses: ./.github/workflows/run_pipeline.yml
    with:
      config_path: configs/global_payments.json
      lookback_days: ${{ github.event.inputs.lookback_days || '30' }}
      run_type: 'deep_dive'
      run_prune: ${{ github.event.schedule != '' && contains(github.event.schedule, '0 17 * * 0') }}
    secrets: inherit
