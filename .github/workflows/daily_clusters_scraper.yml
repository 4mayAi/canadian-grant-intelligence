name: Global Innovation Clusters Pipeline

on:
#   schedule:
#     - cron: '0 15 * * *' # Run daily at 15:00 UTC (11:00 AM EDT)
  workflow_dispatch:     # Allow manual runs
    inputs:
      lookback_days:
        description: 'Number of days to look back for news'
        required: false
        default: '30'
        type: string

permissions:
  contents: write

jobs:
  run-pipeline:
    uses: ./.github/workflows/run_pipeline.yml
    with:
      config_path: configs/innovation_clusters.json
      lookback_days: ${{ github.event.inputs.lookback_days || '30' }}
      run_type: 'deep_dive'
      pre_run_script: 'scratch/clear_cache.py'
      run_prune: ${{ github.event.schedule != '' && contains(github.event.schedule, '0 15 * * 0') }}
    secrets: inherit
