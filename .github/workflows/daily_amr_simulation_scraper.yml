name: AMR & Biotech Simulation Intelligence Pipeline

on:
  schedule:
    - cron: '0 18 * * *' # Run daily at 18:00 UTC (2:00 PM EDT)
  workflow_dispatch:     # Allow manual runs
    inputs:
      lookback_days:
        description: 'Number of days to look back for news'
        required: false
        default: '30'
        type: string

permissions:
  contents: write

jobs:
  run-pipeline:
    uses: ./.github/workflows/run_pipeline.yml
    with:
      config_path: configs/amr_simulation.json
      lookback_days: ${{ github.event.inputs.lookback_days || '30' }}
      run_type: 'deep_dive'
      run_prune: ${{ github.event.schedule != '' && contains(github.event.schedule, '0 18 * * 0') }}
      pre_run_script: 'scratch/reprocess_innovet_tender.py'
    secrets: inherit
