name: Canadian Grants Intelligence Pipeline

on:
#   schedule:
#     - cron: '0 14 * * *' # 10:00 AM EDT — catches morning releases
#     - cron: '0 18 * * *' # 2:00 PM EDT — catches midday releases
#     - cron: '0 22 * * *' # 6:00 PM EDT — catches end-of-day releases
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run mode (PULSE or DEEP_DIVE)'
        required: true
        default: 'DEEP_DIVE'
        type: choice
        options:
          - PULSE
          - DEEP_DIVE
          - seed_strategy
      lookback_days:
        description: 'Number of days to look back for PMO news'
        required: false
        default: '7'
        type: string

permissions:
  contents: write

jobs:
  run:
    uses: ./.github/workflows/run_pipeline.yml
    with:
      config_path: configs/canadian_grants.json
      lookback_days: ${{ github.event.inputs.lookback_days || '7' }}
      run_type: ${{ github.event.inputs.run_type || 'DEEP_DIVE' }}
      run_prune: ${{ github.event.schedule != '' && contains(github.event.schedule, '0 22 * * 0') }}
      pre_run_script: scripts/backfill_playbook_labels.py
    secrets: inherit
