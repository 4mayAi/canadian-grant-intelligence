name: Canadian Grants Intelligence Pipeline
 
on:
  schedule:
    - cron: '0 7 * * *'  # 7:00 AM UTC (Deep Dive)
    - cron: '0 13 * * *' # 1:00 PM UTC (Pulse)
    - cron: '0 19 * * *' # 7:00 PM UTC (Pulse)
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run mode (PULSE or DEEP_DIVE)'
        required: true
        default: 'PULSE'
        type: choice
        options:
          - PULSE
          - DEEP_DIVE
      lookback_days:
        description: 'Number of days to look back for PMO news'
        required: false
        default: '2'
        type: string

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Caching pip dependencies

      - name: Install Dependencies
        run: |
          pip install requests feedparser python-dateutil azure-storage-blob playwright
          
      - name: Cache Playwright Binaries
        uses: actions/cache@v3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

      - name: Install Playwright Browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          SCRAPE_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '2' }}
          RUN_TYPE: >-
            ${{ 
              github.event.inputs.run_type || 
              (github.event.schedule == '0 7 * * *' && 'DEEP_DIVE' || 'PULSE') 
            }}
        run: python scripts/fetch_canadian_grants.py

      - name: Commit and Push Report
        # Only push git reports during DEEP_DIVE to avoid repo noise
        if: env.RUN_TYPE == 'DEEP_DIVE'
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add reports/
          git commit -m "Automated Intelligence Report: $(date +'%Y-%m-%d')" || exit 0
          git push

      - name: Send Email Digest
        # Only send email for high-signal Deep Dive runs
        if: env.RUN_TYPE == 'DEEP_DIVE' && success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_ADDRESS }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          subject: "🇨🇦 Grant Intelligence — $(date +'%b %d, %Y')"
          to: ${{ secrets.EMAIL_ADDRESS }}
          from: Canadian Grant Intelligence <${{ secrets.EMAIL_ADDRESS }}>
          body: |
            Your daily Canadian Grant Intelligence deep-dive is ready.
            
            View the full dashboard: https://4mayAi.github.io/canadian-grant-intelligence/
            
            ---
            LinkedIn Post (copy-paste ready):
          html_body: file://reports/linkedin/latest_post.md
          convert_markdown: true
