name: Daily Canadian Grants Scraper

on:
  schedule:
    - cron: '0 8 * * *' # 8:00 AM UTC Daily
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Number of days to look back for PMO news (default: 2)'
        required: false
        default: '2'
        type: string

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests feedparser python-dateutil azure-storage-blob playwright
          playwright install chromium

      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          SCRAPE_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '2' }}
        run: python scripts/fetch_canadian_grants.py

      - name: Commit and Push Report
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add reports/
          git commit -m "Automated Daily Grant Report: $(date +'%Y-%m-%d')" || exit 0
          git push

      - name: Send Email Digest
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_ADDRESS }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          subject: "🇨🇦 Grant Intelligence — $(date +'%b %d, %Y')"
          to: ${{ secrets.EMAIL_ADDRESS }}
          from: Canadian Grant Intelligence <${{ secrets.EMAIL_ADDRESS }}>
          body: |
            Your daily Canadian Grant Intelligence digest is ready.

            View the full dashboard: https://emurira.github.io/canadian-grant-intelligence/

            ---
            LinkedIn Post (copy-paste ready):
          html_body: file://reports/linkedin/latest_post.md
          convert_markdown: true
