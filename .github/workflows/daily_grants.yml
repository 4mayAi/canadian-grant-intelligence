name: Daily Grant Intelligence
on: [workflow_dispatch, schedule]
jobs:
  run:
      runs-on: ubuntu-latest
          steps:
                - uses: actions/checkout@v4
                      - uses: actions/setup-python@v4
                              with:
                                        python-version: '3.10'
                                              - run: pip install requests feedparser
                                                    - env:
                                                              GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
                                                                      run: python scripts/fetch_canadian_grants.py
                                                                            - run: |
                                                                                      git config user.name "bot"
                                                                                                git config user.email "bot"
                                                                                                          git add reports/grants/report.md
                                                                                                                    git commit -m "Update" || true
                                                                                                                              git push
                                                                                                                              
