name: Gemini Quota Diagnostic

on:
  workflow_dispatch:

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: List Available Models
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          curl "https://generativelanguage.googleapis.com/v1/models?key=$GEMINI_API_KEY" \
          --verbose
