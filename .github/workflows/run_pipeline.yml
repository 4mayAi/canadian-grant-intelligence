name: Reusable Scraper Pipeline

on:
  workflow_call:
    inputs:
      config_path:
        required: true
        type: string
      lookback_days:
        required: false
        default: '30'
        type: string
      run_type:
        required: false
        default: 'deep_dive'
        type: string
      run_prune:
        required: false
        default: false
        type: boolean
      pre_run_script:
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for cleaner rebases

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Cache Playwright Binaries
        uses: actions/cache@v3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

      - name: Install Playwright Browser & OS Dependencies
        run: playwright install --with-deps chromium

      - name: Run Pre-Run Script
        if: ${{ inputs.pre_run_script != '' }}
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          python ${{ inputs.pre_run_script }}

      - name: Run Generic Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          # Pass all potential webhooks and recipient secrets so they are available in env for interpolation
          DISCORD_WEBHOOK_GRANTS: ${{ secrets.DISCORD_WEBHOOK_GRANTS || secrets.DISCORD_WEBHOOK_URL }}
          SMTP_RECIPIENT_GRANTS: ${{ secrets.SMTP_RECIPIENT_GRANTS || secrets.ALERT_EMAIL_ADDRESS }}
          DISCORD_WEBHOOK_CLUSTERS: ${{ secrets.DISCORD_WEBHOOK_CLUSTERS }}
          SMTP_RECIPIENT_CLUSTERS: ${{ secrets.SMTP_RECIPIENT_CLUSTERS }}
          DISCORD_WEBHOOK_MINING: ${{ secrets.DISCORD_WEBHOOK_MINING || secrets.DISCORD_WEBHOOK_CLUSTERS }}
          SMTP_RECIPIENT_MINING: ${{ secrets.SMTP_RECIPIENT_MINING || secrets.SMTP_RECIPIENT_CLUSTERS }}
          DISCORD_WEBHOOK_PAYMENTS: ${{ secrets.DISCORD_WEBHOOK_PAYMENTS || secrets.DISCORD_WEBHOOK_CLUSTERS }}
          SMTP_RECIPIENT_PAYMENTS: ${{ secrets.SMTP_RECIPIENT_PAYMENTS || secrets.SMTP_RECIPIENT_CLUSTERS }}
          DISCORD_WEBHOOK_AMR: ${{ secrets.DISCORD_WEBHOOK_AMR || secrets.DISCORD_WEBHOOK_CLUSTERS }}
          SMTP_RECIPIENT_AMR: ${{ secrets.SMTP_RECIPIENT_AMR || secrets.SMTP_RECIPIENT_CLUSTERS }}
          SCRAPE_LOOKBACK_DAYS: ${{ inputs.lookback_days }}
        run: |
          python generic_engine/main.py --config ${{ inputs.config_path }} --run-type ${{ inputs.run_type }}

      - name: Prune Processed URLs (90-day TTL)
        if: ${{ inputs.run_prune }}
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          python scripts/validators/prune_processed_urls.py --config ${{ inputs.config_path }}

      - name: Commit and Push Local Report Backups
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Stage both docs/data/ and reports/ (for Canadian Grants legacy compatibility)
          git add docs/data/ reports/ 2>/dev/null || true
          git commit -m "Automated Report backup for ${{ inputs.config_path }}: $(date +'%Y-%m-%d')" || exit 0
          
          # Retry loop for push concurrency
          for i in {1..3}; do
            git pull --rebase origin main
            if git push; then
              echo "Push successful!"
              break
            else
              echo "Push failed, retrying in 5 seconds..."
              sleep 5
            fi
          done
