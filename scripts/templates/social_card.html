<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --accent: linear-gradient(135deg, #ffd700, #ff8c00);
            --text: #f1f5f9;
        }
        body {
            margin: 0; padding: 0;
            width: 1200px; height: 627px;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 80% 20%, rgba(255, 215, 0, 0.07), transparent 50%);
            z-index: 0;
        }
        .content {
            padding: 60px 80px;
            position: relative; z-index: 1;
        }
        .header {
            display: flex; align-items: center; gap: 20px; margin-bottom: 40px;
        }
        .logo-container {
            position: relative;
            width: 80px; height: 100px;
            display: flex; align-items: center; justify-content: center;
        }
        .golden-egg {
            width: 60px; height: 80px;
            background: radial-gradient(circle at 30% 30%, #fffef0 0%, #ffd700 40%, #ff8c00 100%);
            border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
            position: relative; z-index: 2;
            box-shadow: 
                inset -5px -5px 15px rgba(0,0,0,0.3),
                inset 5px 5px 15px rgba(255,255,255,0.5),
                0 10px 30px rgba(255, 215, 0, 0.3);
            animation: eggPulse 4s ease-in-out infinite;
        }
        .egg-glow {
            position: absolute;
            width: 120px; height: 140px;
            background: radial-gradient(circle, #ffd700, transparent 70%);
            filter: blur(25px);
            opacity: 0.3;
            z-index: 1;
            animation: glowPulse 4s ease-in-out infinite;
        }
        .brand {
            font-size: 42px; font-weight: 800; letter-spacing: -2px;
            color: #fff;
        }
        .brand span { color: #ffd700; }
        
        @keyframes eggPulse {
            0%, 100% { transform: scale(1) rotate(-2deg); }
            50% { transform: scale(1.08) rotate(2deg); }
        }
        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.4); opacity: 0.5; }
        }
        .hook {
            font-size: 48px; font-weight: 800; line-height: 1.2;
            margin-bottom: 30px;
        }
        .footer {
            position: absolute; bottom: 60px; left: 80px; right: 80px;
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 25px;
        }
        .tagline { color: #94a3b8; font-size: 18px; font-weight: 600; }
        .url { color: #6366f1; font-size: 18px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="content">
        <div class="header">
            <div class="logo-container">
                <div class="golden-egg"></div>
                <div class="egg-glow"></div>
            </div>
            <div class="brand">may<span>Ai</span></div>
        </div>
        <div class="hook" id="hook-text">
            Guayana's booming economy is a goldmine for Canadian B2B!
        </div>
    </div>
    <div class="footer">
        <div class="tagline" id="category-text">Executive Intelligence Report</div>
        <div class="url">emurira.github.io/canadian-grant-intelligence/</div>
    </div>
</body>
</html>
