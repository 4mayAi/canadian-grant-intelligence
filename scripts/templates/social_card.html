<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --accent: linear-gradient(135deg, #6366f1, #06b6d4);
            --text: #f1f5f9;
        }
        body {
            margin: 0; padding: 0;
            width: 1200px; height: 627px;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 80% 20%, rgba(99, 102, 241, 0.15), transparent 50%);
            z-index: 0;
        }
        .content {
            padding: 60px 80px;
            position: relative; z-index: 1;
        }
        .header {
            display: flex; align-items: center; gap: 15px; margin-bottom: 40px;
        }
        .logo-box {
            width: 50px; height: 50px;
            background: var(--accent);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .brand {
            font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hook {
            font-size: 48px; font-weight: 800; line-height: 1.2;
            margin-bottom: 30px;
        }
        .footer {
            position: absolute; bottom: 60px; left: 80px; right: 80px;
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 25px;
        }
        .tagline { color: #94a3b8; font-size: 18px; font-weight: 600; }
        .url { color: #6366f1; font-size: 18px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="content">
        <div class="header">
            <div class="logo-box">🇨🇦</div>
            <div class="brand">Canadian Grant Intelligence</div>
        </div>
        <div class="hook" id="hook-text">
            Guayana's booming economy is a goldmine for Canadian B2B!
        </div>
    </div>
    <div class="footer">
        <div class="tagline" id="category-text">Executive Intelligence Report</div>
        <div class="url">emurira.github.io/canadian-grant-intelligence/</div>
    </div>
</body>
</html>
